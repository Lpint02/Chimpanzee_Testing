version: '3.8'

services:
  # =================================================================
  # 1. BODY: ROS2 Container (Hardware Driver & Bridge)
  # =================================================================
  ros2_img:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    image: ros2_custom
    container_name: ros2
    cpus: '2.0'
    mem_limit: 1g
    volumes:
      - ./src:/workspace/src:rw
      - ./build:/workspace/build:rw
      - ./install:/workspace/install:rw
      - ./log:/workspace/log:rw
      - ./fastdds.xml:/workspace/fastdds.xml:ro
      - ./config:/workspace/config:ro
      - ./start_body.sh:/workspace/start_body.sh:ro
      - /tmp/argus_socket:/tmp/argus_socket
    working_dir: /workspace
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/workspace/fastdds.xml
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64
    runtime: nvidia
    command: bash /workspace/start_body.sh
    
    # NETWORKING:
    # Il container ROS2 DEVE usare 'host' network per parlare col driver del robot.
    # Questo significa che condivide l'IP e le porte della Jetson Nano reale.
    # Per raggiungere Mosquitto: usa 'localhost' (perché Mosquitto espone la porta sull'host).
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    privileged: true
    devices:
      - /dev/video0:/dev/video0
      - /dev/nvhost-ctrl:/dev/nvhost-ctrl
      - /dev/nvhost-ctrl-gpu:/dev/nvhost-ctrl-gpu
      - /dev/nvhost-prof-gpu:/dev/nvhost-prof-gpu
      - /dev/nvmap:/dev/nvmap
      - /dev/nvhost-gpu:/dev/nvhost-gpu
      - /dev/nvhost-as-gpu:/dev/nvhost-as-gpu
    depends_on:
      - mosquitto

  # =================================================================
  # 2. BRAIN: Python Container (Logic & AI)
  # =================================================================
  python310: 
    build: 
      context: .
      dockerfile: Dockerfile
    image: py310_img
    container_name: py310
    cpus: '2.0'
    mem_limit: 1g
    volumes:
      - ./python_src:/src:rw
      - ./config/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro 
    working_dir: /src
    environment:
      # Dal container Bridge, non possiamo usare 'localhost' perché 'host' network non è bridge network.
      # Usiamo 'host.docker.internal' se supportato, oppure l'IP del gateway.
      # MA: Se mettiamo anche python310 sulla rete Host, tutto è più semplice.
      # PRO: Comunicazione facile.
      # CONTRO: Meno isolamento (ma al prof frega poco dell'isolamento di rete vero, vuole solo 2 container).
      # DECISIONE: Usiamo HOST NETWORK per entrambi per semplicità massima sulla Jetson.
      - MQTT_HOST=localhost
    
    network_mode: host
    user: "1000:1000"    
    command: bash start_brain.sh
    depends_on:
      - mosquitto

  # =================================================================
  # 3. NERVOUS SYSTEM: MQTT Broker
  # =================================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    cpus: '2.0'
    mem_limit: 1g
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    # Espone la porta sulla rete Host
    #ports:
     # - 1883:1883
     # - 9001:9001
    network_mode: host

# Networks section removed because everyone is using 'network_mode: host'
# This is the most robust setup for Jetson Nano hardware access.
